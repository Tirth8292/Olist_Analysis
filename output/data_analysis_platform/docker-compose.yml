services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: olist
      POSTGRES_PASSWORD: olist
      POSTGRES_DB: olist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: bash -lc "pip install -r requirements.txt && uvicorn src.olist_platform.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

volumes:
  postgres_data:

